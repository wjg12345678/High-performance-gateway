name: atlas-webserver

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qgydb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  web:
    image: atlas-webserver:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TWS_DB_HOST: mysql
      TWS_DB_PORT: 3306
      TWS_DB_USER: root
      TWS_DB_PASSWORD: root
      TWS_DB_NAME: qgydb
      TWS_LOG_WRITE: ${TWS_LOG_WRITE:-1}
      TWS_THREAD_NUM: ${TWS_THREAD_NUM:-8}
      TWS_SQL_NUM: ${TWS_SQL_NUM:-8}
      TWS_CONN_TIMEOUT: ${TWS_CONN_TIMEOUT:-15}
    volumes:
      - ./root/uploads:/app/root/uploads
    ports:
      - "9006:9006"
    command: ["./server", "-a", "1"]

volumes:
  mysql-data:
