name: atlas-webserver

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qgydb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  web:
    image: atlas-webserver:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      TWS_DB_HOST: mysql
      TWS_DB_PORT: 3306
      TWS_DB_USER: root
      TWS_DB_PASSWORD: root
      TWS_DB_NAME: qgydb
      TWS_AUTH_RATE_LIMIT_ENABLED: ${TWS_AUTH_RATE_LIMIT_ENABLED:-1}
      TWS_REDIS_HOST: redis
      TWS_REDIS_PORT: 6379
      TWS_REDIS_POOL_SIZE: ${TWS_REDIS_POOL_SIZE:-4}
      TWS_REDIS_CONNECT_TIMEOUT_MS: ${TWS_REDIS_CONNECT_TIMEOUT_MS:-80}
      TWS_REDIS_SOCKET_TIMEOUT_MS: ${TWS_REDIS_SOCKET_TIMEOUT_MS:-80}
      TWS_REDIS_MAX_RETRIES: ${TWS_REDIS_MAX_RETRIES:-0}
      TWS_AUTH_LOGIN_IP_MAX_TOKENS: ${TWS_AUTH_LOGIN_IP_MAX_TOKENS:-60}
      TWS_AUTH_LOGIN_IP_REFILL_RATE: ${TWS_AUTH_LOGIN_IP_REFILL_RATE:-1.0}
      TWS_AUTH_LOGIN_USER_MAX_TOKENS: ${TWS_AUTH_LOGIN_USER_MAX_TOKENS:-10}
      TWS_AUTH_LOGIN_USER_REFILL_RATE: ${TWS_AUTH_LOGIN_USER_REFILL_RATE:-0.166667}
      TWS_AUTH_REGISTER_IP_MAX_TOKENS: ${TWS_AUTH_REGISTER_IP_MAX_TOKENS:-30}
      TWS_AUTH_REGISTER_IP_REFILL_RATE: ${TWS_AUTH_REGISTER_IP_REFILL_RATE:-0.05}
      TWS_AUTH_RATE_LIMIT_FALLBACK_MODE: ${TWS_AUTH_RATE_LIMIT_FALLBACK_MODE:-local}
      TWS_LOG_WRITE: ${TWS_LOG_WRITE:-1}
      TWS_LOG_QUEUE_SIZE: ${TWS_LOG_QUEUE_SIZE:-800}
      TWS_THREAD_NUM: ${TWS_THREAD_NUM:-8}
      TWS_THREADPOOL_MAX_THREADS: ${TWS_THREADPOOL_MAX_THREADS:-8}
      TWS_THREADPOOL_IDLE_TIMEOUT: ${TWS_THREADPOOL_IDLE_TIMEOUT:-30}
      TWS_THREADPOOL_QUEUE_MODE: ${TWS_THREADPOOL_QUEUE_MODE:-mutex}
      TWS_SQL_NUM: ${TWS_SQL_NUM:-8}
      TWS_UPLOAD_MAX_BYTES: ${TWS_UPLOAD_MAX_BYTES:-104857600}
      TWS_CONN_TIMEOUT: ${TWS_CONN_TIMEOUT:-60}
    volumes:
      - ./webroot/uploads:/app/webroot/uploads
    ports:
      - "9006:9006"
    command: ["sh", "-c", "./scripts/migrate_db.sh && ./build/server"]

volumes:
  mysql-data:
