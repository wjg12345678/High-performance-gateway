<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Atlas WebServer</title>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml">
        <link rel="stylesheet" href="/atlas.css">
    </head>
    <body>
        <div class="shell">
            <section class="hero">
                <p class="eyebrow">Workspace</p>
                <h1>鉴权文件服务控制台</h1>
                <p>当前账号已登录，可直接进入文件管理、公开分享和操作审计视图。静态媒体样例仍可访问，但不再作为默认主入口。</p>
            </section>

            <section class="grid two">
                <article class="card">
                    <p class="kicker">Files</p>
                    <h2>文件管理台</h2>
                    <p class="lead">进入文件管理台，集中完成上传、列表浏览、下载、删除和记录查看。</p>
                    <div class="actions">
                        <a class="link-button" href="/files">打开管理台</a>
                    </div>
                </article>

                <article class="card">
                    <p class="kicker">Media</p>
                    <h2>媒体样例</h2>
                    <p class="lead">图片和视频保留为独立媒体样例入口，不混在文件管理台里，方便单独查看加载和播放效果。</p>
                    <div class="actions">
                        <a class="link-button" href="/media">打开媒体样例</a>
                    </div>
                </article>
            </section>
        </div>
    </body>
</html>
