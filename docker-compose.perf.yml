services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.perf
    privileged: true
    cap_add:
      - PERFMON
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./webroot/uploads:/app/webroot/uploads
      - ./reports/perf:/app/reports/perf
