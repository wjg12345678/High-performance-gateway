<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Atlas WebServer</title>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml">
        <link rel="stylesheet" href="/atlas.css">
    </head>
    <body>
        <div class="shell">
            <section class="hero">
                <p class="eyebrow">Authenticated File Service</p>
                <h1>Atlas 鉴权文件服务</h1>
                <p>面向账号登录、Token 会话、文件上传下载、公开分享与操作审计的统一业务入口。默认对外暴露语义化路径，便于持续迭代和正式展示。</p>
            </section>

            <section class="grid two">
                <article class="card">
                    <p class="kicker">New Account</p>
                    <h2>先创建账号</h2>
                    <p class="lead">注册后即可进入登录流程，继续体验文件管理、会话鉴权和操作审计的完整闭环。</p>
                    <div class="actions">
                        <a class="link-button" href="/register">注册账号</a>
                    </div>
                </article>

                <article class="card">
                    <p class="kicker">Returning User</p>
                    <h2>已有账号</h2>
                    <p class="lead">登录后进入控制台，直接处理文件上传、下载、分享状态切换和访问记录查询。</p>
                    <div class="actions">
                        <a class="link-button" href="/login">进入登录</a>
                    </div>
                </article>
            </section>
        </div>
    </body>
</html>
