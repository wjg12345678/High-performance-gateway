<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Atlas WebServer</title>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml">
        <link rel="stylesheet" href="./atlas.css">
    </head>
    <body>
        <div class="shell">
            <section class="hero">
                <p class="eyebrow">Atlas WebServer</p>
                <h1>统一的 C++ 服务端业务入口</h1>
                <p>这里提供账号访问与文件协作入口，页面表达和模块组织已完成统一整理，适合持续迭代与对外展示。</p>
            </section>

            <section class="grid two">
                <article class="card">
                    <p class="kicker">New Session</p>
                    <h2>第一次访问</h2>
                    <p class="lead">先创建账号，再进入文件管理台，完成上传、下载、权限管理与操作记录的完整流程。</p>
                    <div class="actions">
                        <form action="0" method="post">
                            <button type="submit">注册账号</button>
                        </form>
                    </div>
                </article>

                <article class="card">
                    <p class="kicker">Returning User</p>
                    <h2>已有账号</h2>
                    <p class="lead">登录后进入控制台，并继续使用文件管理台完成上传、下载、权限管理与操作记录。</p>
                    <div class="actions">
                        <form action="1" method="post">
                            <button type="submit">进入登录</button>
                        </form>
                    </div>
                </article>
            </section>
        </div>
    </body>
</html>
