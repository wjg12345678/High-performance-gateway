<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Atlas WebServer</title>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml">
        <link rel="stylesheet" href="./atlas.css">
    </head>
    <body>
        <div class="shell">
            <section class="hero">
                <p class="eyebrow">Atlas WebServer</p>
                <h1>连接网络层与业务层的 C++ 服务端项目</h1>
                <p>这里提供统一的登录、注册与文件业务入口。页面风格和后端模块结构已经统一整理，适合直接作为项目展示界面。</p>
            </section>

            <section class="grid two">
                <article class="card">
                    <p class="kicker">New Session</p>
                    <h2>第一次访问</h2>
                    <p class="lead">先创建一个账号，随后可以进入文件管理台，体验上传、下载、权限控制和操作日志闭环。</p>
                    <div class="actions">
                        <form action="0" method="post">
                            <button type="submit">注册账号</button>
                        </form>
                    </div>
                </article>

                <article class="card">
                    <p class="kicker">Returning User</p>
                    <h2>已有账号</h2>
                    <p class="lead">直接登录并进入控制台。登录后可继续进入文件管理台，体验上传、下载、权限控制和操作日志闭环。</p>
                    <div class="actions">
                        <form action="1" method="post">
                            <button type="submit">进入登录</button>
                        </form>
                    </div>
                </article>
            </section>
        </div>
    </body>
</html>
