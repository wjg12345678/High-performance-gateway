<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Atlas WebServer Login</title>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml">
        <link rel="stylesheet" href="./atlas.css">
    </head>
    <body>
        <div class="shell">
            <section class="grid two">
                <article class="hero">
                    <p class="eyebrow">Sign In</p>
                    <h1>登录未通过</h1>
                    <p>本次登录信息未通过校验，请更新账号信息后再次提交，或前往注册页创建新账号。</p>
                    <div class="center-actions">
                        <a class="link-button secondary" href="./register.html">去注册</a>
                        <a class="link-button secondary" href="./index.html">返回入口</a>
                    </div>
                </article>

                <article class="card">
                    <p class="kicker">Retry</p>
                    <h2>再次登录</h2>
                    <form class="stack" action="2CGISQL.cgi" method="post">
                        <div>
                            <label for="login-user">用户名</label>
                            <input id="login-user" type="text" name="user" placeholder="请输入用户名" required="required">
                        </div>
                        <div>
                            <label for="login-password">登录密码</label>
                            <input id="login-password" type="password" name="password" placeholder="请输入密码" required="required">
                        </div>
                        <button type="submit">再次登录</button>
                    </form>
                    <div class="notice error">提示：用户名或密码错误，请检查后重试。</div>
                </article>
            </section>
        </div>
    </body>
</html>
