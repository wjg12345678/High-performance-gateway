<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Atlas WebServer</title>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml">
        <link rel="stylesheet" href="./atlas.css">
    </head>
    <body>
        <div class="shell">
            <section class="hero">
                <p class="eyebrow">Workspace</p>
                <h1>Atlas WebServer 控制台</h1>
                <p>当前账号已登录，可进入文件管理台继续处理文件协作与操作记录。</p>
            </section>

            <section class="grid one">
                <article class="card">
                    <p class="kicker">Files</p>
                    <h2>文件管理台</h2>
                    <p class="lead">进入文件管理台，集中完成上传、列表浏览、下载、删除和记录查看。</p>
                    <div class="actions">
                        <form action="files.html" method="get">
                            <button type="submit">打开管理台</button>
                        </form>
                    </div>
                </article>
            </section>
        </div>
    </body>
</html>
