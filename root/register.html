<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Atlas WebServer Register</title>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml">
        <link rel="stylesheet" href="./atlas.css">
    </head>
    <body>
        <div class="shell">
            <section class="grid two">
                <article class="hero">
                    <p class="eyebrow">Create Account</p>
                    <h1>创建 Atlas WebServer 账号</h1>
                    <p>注册完成后可进入登录流程，并继续使用文件上传、下载、权限管理与操作记录等核心能力。</p>
                    <div class="center-actions">
                        <a class="link-button secondary" href="./login.html">已有账号，去登录</a>
                        <a class="link-button secondary" href="./index.html">返回入口</a>
                    </div>
                </article>

                <article class="card">
                    <p class="kicker">Registration</p>
                    <h2>注册新用户</h2>
                    <form class="stack" action="3CGISQL.cgi" method="post">
                        <div>
                            <label for="register-user">用户名</label>
                            <input id="register-user" type="text" name="user" placeholder="请设置用户名" required="required">
                        </div>
                        <div>
                            <label for="register-password">用户密码</label>
                            <input id="register-password" type="password" name="password" placeholder="请设置密码" required="required">
                        </div>
                        <button type="submit">完成注册</button>
                    </form>
                    <div class="hint">注册信息提交后将进入服务端认证流程，并完成账号写入与身份校验。</div>
                </article>
            </section>
        </div>
    </body>
</html>
