<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Atlas WebServer | 视频查看</title>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml">
        <link rel="stylesheet" href="./atlas.css">
        <style>
            .shell {
                width: min(1180px, calc(100% - 32px));
            }

            .meta {
                margin-top: 10px;
                color: var(--muted);
                line-height: 1.7;
            }

            .media-box {
                margin-top: 22px;
                padding: 18px;
                border-radius: 26px;
                border: 1px solid rgba(159, 77, 47, 0.14);
                background: rgba(255, 250, 242, 0.82);
            }

            .media-box video {
                display: block;
                width: 100%;
                border-radius: 18px;
                background: #0d0d10;
                box-shadow: var(--shadow);
            }

            .link-row {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                margin-top: 18px;
            }
        </style>
    </head>
    <body>
        <div class="shell">
            <section class="hero">
                <p class="eyebrow">Video Viewer</p>
                <h1>视频查看页</h1>
                <p>这里专门展示静态视频资源，不混排照片内容，方便单独检查视频播放效果。</p>
            </section>

            <section class="card">
                <p class="kicker">Video</p>
                <h2>视频播放</h2>
                <p class="meta">资源文件：<code>/video_20260419_214842_edit.mp4</code></p>
                <div class="media-box">
                    <video controls playsinline preload="metadata">
                        <source src="/video_20260419_214842_edit.mp4" type="video/mp4">
                        当前浏览器不支持内嵌视频播放。
                    </video>
                </div>
                <div class="link-row">
                    <a class="link-button" href="/video_20260419_214842_edit.mp4" target="_blank" rel="noopener">新窗口打开视频</a>
                    <a class="link-button secondary" href="/media">返回资源入口</a>
                </div>
            </section>
        </div>
    </body>
</html>
