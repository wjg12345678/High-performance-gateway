# Atlas WebServer config
#
# 敏感配置（密码、密钥等）建议通过环境变量设置，环境变量优先级高于本文件：
#   TWS_AUTH_TOKEN   - API 鉴权 token
#   TWS_DB_HOST      - 数据库主机
#   TWS_DB_PORT      - 数据库端口
#   TWS_DB_USER      - 数据库用户名
#   TWS_DB_PASSWORD  - 数据库密码
#   TWS_DB_NAME      - 数据库名称
#
# 示例: export TWS_AUTH_TOKEN="your-secret-token"
#       export TWS_DB_PASSWORD="your-db-password"
port=9006
log_write=1
log_level=1
log_split_lines=800000
log_queue_size=800
trig_mode=3
opt_linger=0
sql_num=8
thread_num=8
threadpool_max_threads=8
threadpool_idle_timeout=30
threadpool_queue_mode=mutex
mysql_idle_timeout=60
conn_timeout=15
close_log=0
actor_model=0
daemon_mode=0
pid_file=./atlas-webserver.pid
https_enable=0
https_cert_file=./certs/server.crt
https_key_file=./certs/server.key
# auth_token=          # 生产环境请使用 TWS_AUTH_TOKEN 环境变量
db_host=127.0.0.1
db_port=3306
db_user=root
# db_password=         # 生产环境请使用 TWS_DB_PASSWORD 环境变量
db_name=qgydb
